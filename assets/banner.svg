<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0f2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#8e44ad;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#9b59b6;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)" />
  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#9b59b6" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40" />
    <line x1="0" y1="80" x2="900" y2="80" />
    <line x1="0" y1="120" x2="900" y2="120" />
    <line x1="0" y1="160" x2="900" y2="160" />
  </g>
  <!-- Sound wave decorations - left -->
  <g opacity="0.2" stroke="#9b59b6" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M40,100 Q55,50 70,100 Q85,150 100,100 Q115,50 130,100 Q145,150 160,100" />
    <path d="M55,100 Q70,65 85,100 Q100,135 115,100 Q130,65 145,100" />
  </g>
  <!-- Sound wave decorations - right -->
  <g opacity="0.2" stroke="#9b59b6" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M740,100 Q755,50 770,100 Q785,150 800,100 Q815,50 830,100 Q845,150 860,100" />
    <path d="M755,100 Q770,65 785,100 Q800,135 815,100 Q830,65 845,100" />
  </g>
  <!-- Equalizer bars - left -->
  <g opacity="0.12" fill="#9b59b6">
    <rect x="185" y="75" width="4" height="50" rx="2" />
    <rect x="195" y="60" width="4" height="80" rx="2" />
    <rect x="205" y="70" width="4" height="60" rx="2" />
    <rect x="215" y="55" width="4" height="90" rx="2" />
    <rect x="225" y="65" width="4" height="70" rx="2" />
    <rect x="235" y="80" width="4" height="40" rx="2" />
  </g>
  <!-- Equalizer bars - right -->
  <g opacity="0.12" fill="#9b59b6">
    <rect x="660" y="80" width="4" height="40" rx="2" />
    <rect x="670" y="65" width="4" height="70" rx="2" />
    <rect x="680" y="55" width="4" height="90" rx="2" />
    <rect x="690" y="70" width="4" height="60" rx="2" />
    <rect x="700" y="60" width="4" height="80" rx="2" />
    <rect x="710" y="75" width="4" height="50" rx="2" />
  </g>
  <!-- Microphone icon -->
  <g transform="translate(415, 22)" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round">
    <rect x="8" y="0" width="14" height="24" rx="7" />
    <path d="M4,18 Q4,34 15,34 Q26,34 26,18" />
    <line x1="15" y1="34" x2="15" y2="42" />
    <line x1="9" y1="42" x2="21" y2="42" />
  </g>
  <!-- Title -->
  <text x="450" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1.5">
    Curated AI Voice Tools
  </text>
  <!-- Subtitle -->
  <text x="450" y="140" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#b8b8d0" text-anchor="middle" letter-spacing="0.5">
    90+ tools for TTS, STT, voice cloning, music generation &amp; more
  </text>
  <!-- Accent line -->
  <rect x="325" y="155" width="250" height="2" rx="1" fill="url(#accent)" opacity="0.6" />
  <!-- Decorative dots -->
  <g opacity="0.15" fill="#9b59b6">
    <circle cx="325" cy="170" r="2" />
    <circle cx="337" cy="170" r="2" />
    <circle cx="349" cy="170" r="2" />
    <circle cx="551" cy="170" r="2" />
    <circle cx="563" cy="170" r="2" />
    <circle cx="575" cy="170" r="2" />
  </g>
</svg>
