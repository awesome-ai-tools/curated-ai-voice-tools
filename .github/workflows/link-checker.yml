name: Link Checker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8:00 UTC
  workflow_dispatch:

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --cache
            --max-cache-age 7d
            --verbose
            --no-progress
            --accept 200,204,301,302,403,429
            --timeout 30
            --max-retries 3
            --max-concurrency 10
            --exclude-path node_modules
            '*.md'
          fail: false

      - name: Upload link check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: link-report
          path: lychee/out.md
          retention-days: 14
